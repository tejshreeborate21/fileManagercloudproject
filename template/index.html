<!DOCTYPE html>
<html>
<head>
    <title>File Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4">
        <h2 class="text-center mb-4">📁 File Manager</h2>

        <form action="/upload" method="POST" enctype="multipart/form-data" class="mb-4">
            <div class="input-group">
                <input type="file" name="file" class="form-control" required>
                <button class="btn btn-primary">Upload</button>
            </div>
        </form>

        <h4 class="mb-3">Stored Files</h4>

        <div class="row">
            {% for file in files %}
            <div class="col-md-4 mb-3">
                <div class="card p-2 shadow-sm">

                    {% if file.type.startswith('image') %}
                        <img src="/download/{{ file.name }}" class="img-fluid mb-2" style="height:150px; object-fit:cover;">
                    {% else %}
                        <div class="text-center p-4 bg-secondary text-white mb-2">
                            📄 No Preview
                        </div>
                    {% endif %}

                    <strong>{{ file.name }}</strong>
                    <small>Type: {{ file.type }}</small><br>
                    <small>Size: {{ file.size }} KB</small>

                    <div class="mt-2 d-flex justify-content-between">
                        <a href="/download/{{ file.name }}" class="btn btn-success btn-sm">Download</a>

                        <form action="/delete/{{ file.name }}" method="POST">
                            <button class="btn btn-danger btn-sm"
                                    onclick="return confirm('Delete this file?')">
                                Delete
                            </button>
                        </form>
                    </div>

                </div>
            </div>
            {% endfor %}
        </div>

        <div class="text-center mt-3">
            <a href="/logout" class="btn btn-outline-secondary">Logout</a>
        </div>
    </div>
</div>

</body>
</html>
